name: Build and Push Backend Image

on:
  push:
    branches: [ "dev" ]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build image
        run: |
          docker build \
            -t ghcr.io/mentorisapp/mentoris_api:latest \
            -t ghcr.io/mentorisapp/mentoris_api:${{ github.sha }} \
            .

      - name: Push image
        run: |
          docker push ghcr.io/mentorisapp/mentoris_api:latest
          docker push ghcr.io/mentorisapp/mentoris_api:${{ github.sha }}